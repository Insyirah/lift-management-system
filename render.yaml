services:
  - type: web
    name: lift-inspection-system
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: "Lift Inspection System"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_KEY
        sync: false
      - key: APP_URL
        fromService:
          name: lift-inspection-system
          type: web
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: lift-inspection-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: lift-inspection-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: lift-inspection-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: lift-inspection-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lift-inspection-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

databases:
  - name: lift-inspection-db
    plan: free
    databaseName: lift_inspection
